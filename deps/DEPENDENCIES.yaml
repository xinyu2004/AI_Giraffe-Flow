# Giraffe Flow dependency manifest
# Canonical list — edit here first, then update versions.lock.md
# Status: planned (not fetched / not built yet)

schema_version: 1

policy:
  pin: exact           # prefer exact tags / commit SHAs when integrating
  license_review: required
  # Board/runtime deps: always source-build with the active toolchain into
  # middleware/.deps-prefix (bootstrap) or via CMake add_subdirectory — never rely on
  # host apt packages as the path that will ship to the board.
  runtime_from_source: true
  board_build_excludes:
    - category: host_tools_ui
    - category: ros_desktop
  default_integration: source_staging  # bootstrap → middleware/.deps-prefix / middleware/third_party

categories:
  runtime_board:
    description: Linked or executed on target (desktop or embedded)
  host_tools:
    description: Host PC — gf-codegen, GMT
  ros_ecosystem_host:
    description: Foxglove, PlotJuggler, rosbag2 — never on board
  ota_stack:
    description: OTA backends (ucm) — profile-gated
  diag_doip:
    description: DoIP / diagnostic transport — profile-gated
  optional:
    description: Feature-gated / profile-gated

dependencies:
  - id: attr
    name: GNU attr
    category: runtime_board
    purpose: xattr support; build dependency of acl
    homepage: https://savannah.nongnu.org/projects/attr
    license: GPL-2.0-or-later OR LGPL-2.1-or-later
    planned_version: "2.5.2"
    integration: source_staging
    enabled_profiles: [desktop, board, vehicle-debug, production]
    notes: >
      Built by scripts/bootstrap_deps.sh into middleware/.deps-prefix with host or
      GF_CROSS_PREFIX toolchain. Not taken from apt for board path.

  - id: acl
    name: GNU acl
    category: runtime_board
    purpose: POSIX ACL headers/libs required by iceoryx on Linux
    homepage: https://savannah.nongnu.org/projects/acl
    license: GPL-2.0-or-later OR LGPL-2.1-or-later
    planned_version: "2.3.2"
    integration: source_staging
    depends_on: [attr]
    enabled_profiles: [desktop, board, vehicle-debug, production]
    notes: >
      Same staging path as attr. Host apt libacl1-dev is NOT the board strategy.

  - id: iceoryx
    name: Eclipse iceoryx
    category: runtime_board
    purpose: On-SoC zero-copy IPC binding
    homepage: https://github.com/eclipse-iceoryx/iceoryx
    license: Apache-2.0
    planned_version: "v2.0.8"
    integration: cmake_fetchcontent
    enabled_profiles: [desktop, board, vehicle-debug, production]
    notes: >
      Classic C++ iceoryx (not iceoryx2). Source in middleware/third_party/iceoryx;
      CMake add_subdirectory with the same toolchain. Needs ACL from
      middleware/.deps-prefix (bootstrap builds attr+acl from source).

  - id: vsomeip
    name: COVESA vsomeip
    category: runtime_board
    purpose: SOME/IP + service discovery binding
    homepage: https://github.com/COVESA/vsomeip
    license: MPL-2.0
    planned_version: TBD
    integration: cmake_fetchcontent
    enabled_profiles: [desktop, board, vehicle-debug, production]
    notes: May pull Boost.Asio

  - id: cyclonedds
    name: Eclipse Cyclone DDS
    category: runtime_board
    purpose: DDS binding / ROS 2 interop path
    homepage: https://github.com/eclipse-cyclonedds/cyclonedds
    license: EPL-2.0 OR BSD-3-Clause
    planned_version: TBD
    integration: cmake_fetchcontent
    enabled_profiles: [desktop, board, vehicle-debug]
    notes: May be disabled in production profile if unused

  - id: cyclonedds_cxx
    name: Cyclone DDS C++ binding
    category: runtime_board
    purpose: C++ API for DDS binding
    homepage: https://github.com/eclipse-cyclonedds/cyclonedds-cxx
    license: EPL-2.0 OR BSD-3-Clause
    planned_version: TBD
    integration: cmake_fetchcontent
    depends_on: [cyclonedds]
    enabled_profiles: [desktop, board, vehicle-debug]

  - id: nlohmann_json
    name: nlohmann/json
    category: runtime_board
    purpose: Manifest / SOR JSON parsing (runtime + tools)
    homepage: https://github.com/nlohmann/json
    license: MIT
    planned_version: TBD
    integration: cmake_fetchcontent
    enabled_profiles: [desktop, board, vehicle-debug, production]

  - id: yaml_cpp
    name: yaml-cpp
    category: host_tools
    purpose: req.yaml / profile parsing in tools
    homepage: https://github.com/jbeder/yaml-cpp
    license: MIT
    planned_version: TBD
    integration: cmake_fetchcontent
    enabled_profiles: [desktop]

  - id: cli11
    name: CLI11
    category: host_tools
    purpose: CLI for importer/codegen/lint
    homepage: https://github.com/CLIUtils/CLI11
    license: BSD-3-Clause
    planned_version: TBD
    integration: cmake_fetchcontent
    enabled_profiles: [desktop]

  - id: spdlog
    name: spdlog
    category: optional
    purpose: Optional structured logging backend before DLT
    homepage: https://github.com/gabime/spdlog
    license: MIT
    planned_version: TBD
    integration: cmake_fetchcontent
    enabled_profiles: [desktop, board, vehicle-debug]

  - id: gtest
    name: GoogleTest
    category: host_tools
    purpose: Unit / component tests
    homepage: https://github.com/google/googletest
    license: BSD-3-Clause
    planned_version: TBD
    integration: cmake_fetchcontent
    enabled_profiles: [desktop]

  - id: boost
    name: Boost (subset)
    category: optional
    purpose: Transitive need for vsomeip / Asio if not replaced
    homepage: https://www.boost.org/
    license: BSL-1.0
    planned_version: TBD
    integration: system_package
    enabled_profiles: [desktop, board]
    notes: Prefer system packages on board BSPs when available

  - id: openvx
    name: OpenVX (implementation TBD)
    category: optional
    purpose: Vision pipeline + trace hooks
    homepage: https://www.khronos.org/openvx/
    license: TBD (impl-dependent)
    planned_version: TBD
    integration: system_package
    enabled_profiles: [desktop, board]
    notes: Vendor SDK or Khronos sample — decide per SoC

  - id: mcap
    name: MCAP C++ library
    category: host_tools
    purpose: GMT measure session read/write
    homepage: https://github.com/foxglove/mcap
    license: MIT
    planned_version: TBD
    integration: cmake_fetchcontent
    enabled_profiles: [desktop, vehicle-debug]

  - id: cantools
    name: cantools
    category: host_tools
    purpose: DBC parse in gf-codegen import (Python subprocess)
    homepage: https://github.com/cantools/cantools
    license: MIT
    planned_version: TBD
    integration: python_package
    enabled_profiles: [desktop]

  - id: rauc
    name: RAUC
    category: ota_stack
    purpose: A/B slot OTA backend candidate for gf_ara::ucm
    homepage: https://github.com/rauc/rauc
    license: LGPL-2.1
    planned_version: TBD
    integration: system_package
    enabled_profiles: [board, vehicle-debug, production]
    notes: Evaluate for ucm adapter; SWUpdate explicitly excluded

  - id: ostree
    name: OSTree
    category: ota_stack
    purpose: Atomic tree OTA candidate (P2 evaluation)
    homepage: https://ostreedev.github.io/ostree/
    license: LGPL-2.0+
    planned_version: TBD
    integration: system_package
    enabled_profiles: [board]
    notes: Alternative OTA path

  - id: doip_cpp
    name: DoIP stack (candidate)
    category: diag_doip
    purpose: ISO 13400 DoIP for gf_ara::diag
    homepage: TBD
    license: TBD
    planned_version: TBD
    integration: cmake_fetchcontent
    enabled_profiles: [board, vehicle-debug, production]
    notes: Spike vs minimal in-tree DoIP

deferred:
  - id: ros2_rclcpp
    reason: Prefer DDS direct interop first; full ROS2 optional later
  - id: dlt_daemon
    reason: ara::log DLT compatibility is P1+
  - id: sqlite
    reason: persistency (ara::per) is P1
