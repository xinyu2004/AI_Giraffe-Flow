# OEM B — ADC 行泊一体（完整模块）
schema_version: "0.1"
profile: vehicle-debug
variant: adc_driving_parking
topology: ap_mcu_cp
product: ADC

capabilities:
  - front_camera
  - surround_camera
  - uss
  - parking
  - driving
  - mcu_ipc

runtime_modules:
  - core
  - com
  - log

bindings:
  - iceoryx
  - cross_domain_ipc

observability:
  live_tap:
    enabled: false
    services: []
  record:
    mode: sampled
    services:
      - services.semantic.EgoMotion
      - services.semantic.Trajectory
  remote_log_dump: on
  trace_export: on

apps:
  - adapters/mcu_cp_gateway
  - simulators/cp_ipc_peer
  - simulators/perception_feed
  - demo_pipeline

acceptance:
  description: "ADC 行泊一体 — 前视/环视/USS/泊车/行车 + MCU"
  lineage_required: true
  required_services:
    - services.semantic.EgoMotion
    - services.semantic.UssZones
    - services.semantic.FrontObjectList
    - services.semantic.SurroundWorld
    - services.semantic.ParkingWorld
    - services.semantic.DrivingObjectList
    - services.semantic.Trajectory
