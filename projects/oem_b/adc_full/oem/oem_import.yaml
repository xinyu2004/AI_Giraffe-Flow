# OEM 导入策略 — ADC 行泊一体
schema_version: "0.1.0"
project_id: adc_full
topology_default: ap_mcu_cp

sources:
  - id: vehicle_can_dbc
    kind: dbc
    path: oem_import.dbc
    source_origin: null
    extract: dbc_vehicle_can.extract.yaml
    bus_id: vehicle_can
    nodes: [AFC, TDA4VE, AutoBox, TeampoEVB]
    gateway:
      process: adapter.vehicle_can_gateway
      provides:
        - services.semantic.EgoMotion
        - services.semantic.VehicleModeStatus

extraction:
  dbc:
    exclude_name_patterns:
      - "P_USS_SEN*"
      - "APA_SHOW_*"
      - "VECTOR__*"
    module_owned:
      - pattern: "PDC_INFO"
        owner_process: sensing.uss
        semantic: services.semantic.UssZones
      - pattern: "P_USS_INFO*"
        owner_process: sensing.uss
        semantic: services.semantic.UssZones
      - pattern: "P_USS_SEN*"
        owner_process: sensing.uss
        note: "探头原始 — 仅 USS 模块内部"
    include_messages:
      - P_VEHICLE_INFO
      - P_APA_STS
      - P_APA_SLOT1
      - P_APA_SLOT2
      - P_APA_SLOT3
      - P_APA_SLOT4
      - P_APA_SLOT5
      - P_APA_SLOT6
      - VISION_OBSTACLE
      - VISION_OBSTACLE_EXT
      - PDC_INFO
      - P_SYNC_INFO

output:
  fragment_id: oem_b_adc_can
  sections: [imports_meta, adapter_mappings, types]
  merge_policy: overlay
