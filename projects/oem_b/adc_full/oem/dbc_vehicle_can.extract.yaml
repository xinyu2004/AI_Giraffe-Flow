# 提炼表：与 oem_import.dbc 对齐（供人工 review；非 compose 强制输入）
# 正式 OEM 全量通信矩阵到达后，由此表 + suggest 工具生成/校验白名单

dbc_file: oem_import.dbc
source_origin_dbc: null
note: >
  demo 精简 DBC。USS/PDC 大批量帧归 sensing.uss 模块拥有，
  向上只发 services.semantic.UssZones；不进 SOR 逐探头映射。

buses:
  - id: vehicle_can
    bitrate_kbps: null

messages:
  - name: P_VEHICLE_INFO
    frame_id: 0x631
    dlc: 8
    sender: AutoBox
    cycle_ms: 20
    semantic_service: services.semantic.EgoMotion
    semantic_type: types.EgoMotion
    signals:
      - { name: P_Vehicle_Speed,      start: 31, len: 8,  factor: 0.05,  offset: 0,     unit: m/s,   semantic: speed_mps }
      - { name: P_Vehicle_YawRate,    start: 3,  len: 10, factor: 0.2,   offset: -102.4, unit: deg/s, semantic: yaw_rate_degps }
      - { name: P_Vehicle_SteerAngle, start: 9,  len: 10, factor: 4,     offset: -2048, unit: deg,   semantic: steer_angle_deg }
      - { name: P_Vehicle_Gear,       start: 7,  len: 4,  factor: 1,     offset: 0,     unit: "",    semantic: gear }
      - { name: P_Vehicle_FL_Speed,   start: 39, len: 8,  factor: 0.05,  offset: 0,     unit: m/s,   semantic: wheel_speed_fl_mps }
      - { name: P_Vehicle_FR_Speed,   start: 47, len: 8,  factor: 0.05,  offset: 0,     unit: m/s,   semantic: wheel_speed_fr_mps }
      - { name: P_Vehicle_RL_Speed,   start: 55, len: 8,  factor: 0.05,  offset: 0,     unit: m/s,   semantic: wheel_speed_rl_mps }
      - { name: P_Vehicle_RR_Speed,   start: 63, len: 8,  factor: 0.05,  offset: 0,     unit: m/s,   semantic: wheel_speed_rr_mps }

  - name: P_APA_STS
    frame_id: 0x630
    dlc: 8
    sender: AutoBox
    cycle_ms: 100
    semantic_service: services.semantic.VehicleModeStatus
    semantic_type: types.VehicleModeStatus
    signals:
      - { name: P_APA_OnOff,   start: 15, len: 2, semantic: apa_on_off }
      - { name: P_APA_Mode,    start: 13, len: 2, semantic: apa_mode }
      - { name: P_APA_Status,  start: 11, len: 4, semantic: apa_status }
      - { name: P_AVM_OnOff,   start: 7,  len: 2, semantic: avm_on_off }
      - { name: P_AVM_Mode,    start: 5,  len: 4, semantic: avm_mode }

  - name: P_APA_SLOT1
    frame_id: 0x600
    dlc: 8
    sender: TDA4VE
    semantic_type: types.ParkingSlot
    note: "P_APA_SLOT1..6 在 perception.parking 聚合为 ParkingWorld.slots[6]"
    signals:
      - { name: P_APA_Slot1_id,    start: 6,  len: 7,  semantic: slot_id }
      - { name: P_APA_Slot1_P0X,   start: 11, len: 12, factor: 0.01, offset: -20.48, semantic: p0_x_m }
      - { name: P_APA_Slot1_P0Y,   start: 31, len: 12, factor: 0.01, offset: -20.48, semantic: p0_y_m }
      - { name: P_APA_Slot1_P1X,   start: 35, len: 12, factor: 0.01, offset: -20.48, semantic: p1_x_m }
      - { name: P_APA_Slot1_P1Y,   start: 55, len: 12, factor: 0.01, offset: -20.48, semantic: p1_y_m }

  - name: VISION_OBSTACLE
    frame_id: 0x721
    dlc: 8
    sender: TDA4VE
    cycle_ms: 50
    semantic_type: types.VisionObstacle
    signals:
      - { name: V_OBSTACLE_ID,           start: 7,  len: 8, semantic: id }
      - { name: V_OBSTACLE_CONF,         start: 15, len: 8, factor: 0.5, semantic: confidence }
      - { name: V_OBSTACLE_TYPE,         start: 23, len: 4, semantic: type }
      - { name: V_OBSTACLE_HeadingAngle, start: 31, len: 9, factor: 1, offset: -256, semantic: heading_deg }

  - name: PDC_INFO
    frame_id: 0x700
    dlc: 4
    sender: AutoBox
    owner_process: sensing.uss
    semantic_service: services.semantic.UssZones
    signals:
      - { name: PDC_FL_Status,  semantic: zone_fl }
      - { name: PDC_FRM_Status, semantic: zone_frm }
      - { name: PDC_FR_Status,  semantic: zone_fr }
      - { name: PDC_RL_Status,  semantic: zone_rl }
      - { name: PDC_RRM_Status, semantic: zone_rrm }
      - { name: PDC_RR_Status,  semantic: zone_rr }
      - { name: PDC_Sys_Status, semantic: sys_status }

  - name: P_SYNC_INFO
    frame_id: 0x632
    dlc: 8
    sender: AutoBox
    signals:
      - { name: P_Sync_X,     factor: 0.01,   offset: -327.68, semantic: sync_x_m }
      - { name: P_Sync_Y,     factor: 0.01,   offset: -327.68, semantic: sync_y_m }
      - { name: P_Sync_ANGLE, factor: 0.0001, offset: -3.2768, semantic: sync_angle_rad }

module_owned_bulk:
  patterns: ["P_USS_SEN*", "P_USS_INFO*"]
  owner_process: sensing.uss
  reason: "探头级原始数据不进 SOR；sensing.uss 发布 UssZones 摘要"
