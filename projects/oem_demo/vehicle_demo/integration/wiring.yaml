# 信号连线（系统工程师）— 四类输入之二
schema_version: "0.1"
project_id: vehicle_demo
variant: vehicle_demo_full
topology: ap_mcu_cp

modules:
  - id: adapter.mcu_cp_gateway
    hpp: Requirement/modules/mcu_cp_gateway/io_types.hpp
    package: giraffe/adapters/mcu_cp_gateway
  - id: perception.parking
    hpp: Requirement/modules/perception_parking/io_types.hpp
    package: customer/perception-parking
  - id: perception.driving.nullmax
    hpp: Requirement/modules/perception_driving/io_types.hpp
    package: customer/nullmax-perception-driving

deployments:
  - process: adapter.vehicle_can_gateway
    compute_domain: ap_linux
    provides:
      - services.semantic.EgoMotion
      - services.semantic.VehicleModeStatus
      - services.semantic.ParkingWorld
    requires: []

  - process: adapter.mcu_cp_gateway
    compute_domain: ap_linux
    provides:
      - services.semantic.EgoMotion
      - services.semantic.EgoMotionExtended
      - services.semantic.VehicleModeStatus
    requires:
      - services.semantic.Trajectory
      - services.semantic.ActuatorCommand

  - process: perception.driving.nullmax
    compute_domain: ap_linux
    provides:
      - services.semantic.DrivingObjectList
    requires:
      - services.semantic.EgoMotion

  - process: perception.parking
    compute_domain: ap_linux
    provides:
      - services.semantic.ParkingWorld
    requires:
      - services.semantic.EgoMotion
      - services.semantic.VehicleModeStatus

  - process: planning.parking
    compute_domain: ap_linux
    package: customer/planning-parking
    provides:
      - services.semantic.Trajectory
    requires:
      - services.semantic.ParkingWorld
      - services.semantic.EgoMotionExtended

  - process: planning.driving
    compute_domain: ap_linux
    package: customer/planning-driving
    provides:
      - services.semantic.Trajectory
    requires:
      - services.semantic.DrivingObjectList
      - services.semantic.EgoMotion

bindings:
  - module: perception.driving.nullmax
    inputs:
      - { service: semantic.EgoMotion, type: EgoMotion }
    outputs:
      - { service: semantic.DrivingObjectList, type: DrivingObjectList }

  - module: perception.parking
    inputs:
      - { service: semantic.EgoMotion, type: EgoMotion }
      - { service: semantic.VehicleModeStatus, type: VehicleModeStatus }
    outputs:
      - { service: semantic.ParkingWorld, type: ParkingWorld }

  - module: adapter.mcu_cp_gateway
    inputs:
      - { service: semantic.Trajectory, type: Trajectory }
      - { service: semantic.ActuatorCommand, type: ActuatorCommand }
    outputs:
      - { service: semantic.EgoMotion, type: EgoMotion }
      - { service: semantic.EgoMotionExtended, type: EgoMotionExtended }
      - { service: semantic.VehicleModeStatus, type: VehicleModeStatus }

dataflows:
  - { from: adapter.vehicle_can_gateway, service: services.semantic.EgoMotion, to: perception.driving.nullmax }
  - { from: adapter.vehicle_can_gateway, service: services.semantic.EgoMotion, to: perception.parking }
  - { from: adapter.mcu_cp_gateway, service: services.semantic.EgoMotionExtended, to: planning.parking }
  - { from: perception.driving.nullmax, service: services.semantic.DrivingObjectList, to: planning.driving }
  - { from: perception.parking, service: services.semantic.ParkingWorld, to: planning.parking }
  - { from: planning.parking, service: services.semantic.Trajectory, to: adapter.mcu_cp_gateway }
  - { from: planning.parking, service: services.semantic.ActuatorCommand, to: adapter.mcu_cp_gateway }
