# board profile (skeleton)
# ARM Linux embedded primary. Override target_arch per BSP.

name: board
target_os: linux
target_arch: arm          # arm | mips | riscv
toolchain_triple: aarch64-linux-gnu  # example

topology: ap_only         # or ap_mcu_cp

runtime_modules:
  - core
  - com
  - log
  - exec
  - phm
  - sm
  - trace
  # - ucm
  # - diag

bindings:
  iceoryx: enabled
  someip: enabled
  dds: optional
  cross_domain_ipc: off    # on when topology: ap_mcu_cp

observability:
  record: sampled
  trace_export: ring_buffer

apps:
  - adapters/vehicle_motion_gateway
  - simulators/perception_feed
  - demo_pipeline
