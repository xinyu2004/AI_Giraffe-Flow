# desktop profile — host bring-up (x86_64 / aarch64 Linux desktop)
# Runtime deps: ./scripts/bootstrap_deps.sh → middleware/third_party/iceoryx
# Build: cmake -B build && cmake --build build

name: desktop
target: host_linux

bindings:
  iceoryx: enabled
  someip: stub_ok
  dds: stub_ok

observability:
  record: full
  trace_export: on
  architect_tools: on

apps:
  - vehicle_motion_gateway
  - radar
  - camera_ingest
  - perception
  - planning
  - control
  - ivi
